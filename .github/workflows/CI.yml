name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
  pull_request: {}
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
      - uses: extractions/setup-just@v2
      # Need this because we're running `cargo clippy` and `fmt`
      # directly.
      - uses: dsherret/rust-toolchain-file@v1
      - name: Install cbfmt
        run: |
            mkdir /tmp/cbfmt && cd $_
            curl -fsSL -o cbfmt.tar.gz "https://github.com/lukas-reineke/cbfmt/releases/download/v0.2.0/cbfmt_linux-x86_64_v0.2.0.tar.gz"
            tar --strip-components 1 -xvf cbfmt.tar.gz
            mv cbfmt /usr/local/bin/
      - name: Prep venv
        shell: bash
        run: |
          uv venv -p 3.13 venv
          . venv/bin/activate
          uv pip sync --strict requirements/dev.txt
      - name: Check pre-commit hooks
        shell: bash
        run: |
          . venv/bin/activate
          just lint-pc
      - name: Run lints
        shell: bash
        run: |
          . venv/bin/activate
          just lint
      - name: Run Rust tests
        shell: bash
        run: |
          . venv/bin/activate
          just test-rs
      - name: Run documentation tests
        shell: bash
        run: |
          . venv/bin/activate
          just test-doc

  linux:
    strategy:
      matrix:
        target: ['x86_64', 'aarch64', 'armv7']
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
      - uses: extractions/setup-just@v2
      - name: Prep build venv
        shell: bash
        run: |
          uv venv -p 3.10 venv/
          . venv/bin/activate
          uv pip sync --strict requirements/build-py3.10.txt
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: -C force-frame-pointers=yes
        with:
          target: ${{ matrix.target }}
          # Build against the abi3 floor (3.10) so build-time Python cfgs
          # match the abi3 contract. Building against a newer Python in a
          # PyO3 0.22.x manylinux environment can leak post-3.10 symbols
          # (e.g. PyType_GetModuleName via `PyType::module()`).
          args: --release --out dist/ -i 3.10
          sccache: true
      - name: Run Python tests
        # Only run tests for the host architecture, as aarch64 and
        # armv7 are cross-compiled on Ubuntu runners.
        if: ${{ matrix.target == 'x86_64' }}
        shell: bash
        env:
          TEST_KAFKA_BROKER: ${{ secrets.TEST_KAFKA_BROKER }}
          CLUSTER_API_KEY: ${{ secrets.CLUSTER_API_KEY }}
          CLUSTER_API_SECRET: ${{ secrets.CLUSTER_API_SECRET }}
        run: |
          . venv/bin/activate
          WHEEL_FILE=$(ls ./dist/*.whl)
          uv pip install -v --no-deps $WHEEL_FILE
          just test-py
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    strategy:
      matrix:
        target: ['x86_64', 'aarch64']
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: '10.13'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
      - uses: extractions/setup-just@v2
      - name: Prep build venv
        shell: bash
        run: |
          uv venv -p 3.10 venv/
          . venv/bin/activate
          uv pip sync --strict requirements/build-py3.10.txt
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: -C force-frame-pointers=yes
        with:
          target: ${{ matrix.target }}
          # Build against the abi3 floor (3.10) — see linux job for context.
          args: --release --out dist/ -i 3.10
      - name: Run Python tests
        # Only run tests for the host architecture, as x86_64 is
        # cross-compiled on macOS runners.
        if: ${{ matrix.target == 'aarch64' }}
        shell: bash
        env:
          TEST_KAFKA_BROKER: ${{ secrets.TEST_KAFKA_BROKER }}
          CLUSTER_API_KEY: ${{ secrets.CLUSTER_API_KEY }}
          CLUSTER_API_SECRET: ${{ secrets.CLUSTER_API_SECRET }}
        run: |
          . venv/bin/activate
          WHEEL_FILE=$(ls ./dist/*.whl)
          uv pip install -v --no-deps $WHEEL_FILE
          just test-py
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    steps:
      - uses: ilammy/msvc-dev-cmd@v1
      - shell: cmd
        run: |
          set PATH=%PATH%;%wix%bin;"%WindowsSdkVerBinPath%"\x86
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
      - uses: extractions/setup-just@v2
      - name: Prep build venv
        run: |
          uv venv -p 3.10 venv/
          venv/Scripts/activate
          uv pip sync --strict requirements/build-py3.10.txt
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: -C force-frame-pointers=yes
        with:
          # Build against the abi3 floor (3.10) — see linux job for context.
          args: --release --out dist/ -i 3.10
          sccache: true
      - name: Run Python tests
        run: |
          venv/Scripts/activate
          $WHEEL_FILE=@((gci -path dist *.whl|Resolve-path -relative) -replace "","")[0]
          uv pip install -v --no-deps $WHEEL_FILE
          just test-py
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist

  # The main `linux` job builds and tests on Python 3.10 (the abi3 floor).
  # This job exercises the abi3 contract on every newer supported Python
  # by downloading the linux x86_64 artifact and running a tiny end-to-end
  # dataflow.
  test-abi3:
    name: Verify abi3 wheel on Python ${{ matrix.python-version }}
    needs: linux
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Install wheel and run smoke test
        shell: bash
        run: |
          uv venv -p ${{ matrix.python-version }} venv
          . venv/bin/activate
          uv pip install ./dist/*.whl
          python - <<'PY'
          import sys
          import bytewax.operators as op
          from bytewax.dataflow import Dataflow
          from bytewax.testing import TestingSink, TestingSource, run_main

          flow = Dataflow("abi3-smoke")
          inp = op.input("in", flow, TestingSource([1, 2, 3]))
          doubled = op.map("double", inp, lambda x: x * 2)
          out: list[int] = []
          op.output("out", doubled, TestingSink(out))
          run_main(flow)
          assert out == [2, 4, 6], out
          print(f"abi3 smoke ok on python {sys.version_info[:2]}")
          PY

  publish-release:
    name: Attach wheels to a GitHub release
    runs-on: ubuntu-22.04
    # Fires on tag pushes. Tag `v*` (e.g. `v0.21.2`) → full release;
    # any other tag (e.g. `dev-2026-05-03`, `rc-1`) → prerelease.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ linux, macos, windows ]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*-*
          path: wheels
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: wheels/*.whl
          prerelease: ${{ !startsWith(github.ref_name, 'v') }}
